name: Build Platform VSIX

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - rediculous-coding-autoplay

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            target: win32-x64
            helperScript: build:audio-helper:win32-x64
          - runner: windows-11-arm
            target: win32-arm64
            helperScript: build:audio-helper:win32-arm64
          - runner: ubuntu-latest
            target: linux-x64
            helperScript: build:audio-helper:linux-x64
          - runner: ubuntu-24.04-arm
            target: linux-arm64
            helperScript: build:audio-helper:linux-arm64
          - runner: macos-13
            target: darwin-x64
            helperScript: build:audio-helper:darwin-x64
          - runner: macos-14
            target: darwin-arm64
            helperScript: build:audio-helper:darwin-arm64

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target == 'win32-x64' && 'x86_64-pc-windows-msvc' || matrix.target == 'win32-arm64' && 'aarch64-pc-windows-msvc' || matrix.target == 'linux-x64' && 'x86_64-unknown-linux-gnu' || matrix.target == 'linux-arm64' && 'aarch64-unknown-linux-gnu' || matrix.target == 'darwin-x64' && 'x86_64-apple-darwin' || 'aarch64-apple-darwin' }}

      - name: Install GNU Rust host toolchain
        if: matrix.target == 'win32-arm64'
        shell: pwsh
        run: |
          rustup toolchain install stable-x86_64-pc-windows-gnu
          rustup target add x86_64-pc-windows-gnu --toolchain stable-x86_64-pc-windows-gnu
          rustup target add aarch64-pc-windows-msvc --toolchain stable-x86_64-pc-windows-gnu

      - name: Install GNU Windows linker
        if: matrix.target == 'win32-arm64'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc

      - name: Install Linux audio build dependencies
        if: matrix.target == 'linux-x64' || matrix.target == 'linux-arm64'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev pkg-config

      - name: Install dependencies
        run: npm ci

      - name: Build native helper
        run: npm run ${{ matrix.helperScript }}

      - name: Compile extension
        run: npm run compile

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Package VSIX
        run: vsce package --target ${{ matrix.target }}

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix-${{ matrix.target }}
          path: '*.vsix'